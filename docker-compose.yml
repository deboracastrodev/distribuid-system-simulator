networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  # --- MENSAGERIA (Exactly-Once Transport) ---
  kafka:
    image: apache/kafka:3.7.0
    container_name: nexus-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - nexus

  # --- ESTADO ATÔMICO (Idempotency Engine) ---
  redis:
    image: redis:7.2-alpine
    container_name: nexus-redis
    command: redis-server --requirepass nexus_pass
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=nexus_pass redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nexus

  # --- SOURCE OF TRUTH (ACID Storage) ---
  postgres:
    image: postgres:16
    container_name: nexus-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=nexus_db
      - POSTGRES_USER=nexus_user
      - POSTGRES_PASSWORD=nexus_pass
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexus_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nexus

  # --- COORDENAÇÃO (Service Discovery & Health Checks) ---
  consul:
    image: hashicorp/consul:1.22
    container_name: nexus-consul
    command: consul agent -dev -client=0.0.0.0 -dns-port=53 -recursor=127.0.0.11 -config-file=/consul/config/services.json
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    volumes:
      - ./consul-services.json:/consul/config/services.json
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      nexus:
        ipv4_address: 172.28.0.100

  # --- SERVER GO (Event Processor / Exactly-Once Engine) ---
  server:
    build: ./server
    container_name: nexus-server
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
    dns:
      - 172.28.0.100
    dns_search:
      - service.consul
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka.service.consul:29092
      KAFKA_TOPIC: orders
      KAFKA_DLQ_TOPIC: orders-dlq
      KAFKA_CONSUMER_GROUP: nexus-server-group
      REDIS_ADDR: redis.service.consul:6379
      REDIS_PASSWORD: nexus_pass
      POSTGRES_DSN: postgres://nexus_user:nexus_pass@postgres.service.consul:5432/nexus_db?sslmode=disable
      CONSUL_ADDR: consul.service.consul:8500
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      OTEL_SERVICE_NAME: nexus-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus

  # --- AGENTE PLANNER (Python + LangGraph) ---
  agent:
    build: ./agent
    container_name: nexus-agent
    depends_on:
      kafka:
        condition: service_healthy
    dns:
      - 172.28.0.100
    dns_search:
      - service.consul
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka.service.consul:29092
      KAFKA_TOPIC: orders
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: nexus-agent
    profiles:
      - agent
    networks:
      - nexus

  # --- OBSERVABILIDADE (Opcional, mas recomendado para o futuro) ---
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: nexus-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    networks:
      - nexus
